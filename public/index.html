<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>จองโต๊ะร้านอาหาร - LINE Mini App</title>
    <link rel="stylesheet" href="/style.css" />
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  </head>
  <body>
    <main class="container">
      <header class="hero card">
        <div>
          <p class="badge">LINE Mini App</p>
          <h1>🍽️ จองโต๊ะร้านอาหาร</h1>
          <p class="subtitle">จองโต๊ะล่วงหน้าได้ในไม่กี่ขั้นตอน พร้อมดูโต๊ะว่างแบบทันที</p>
        </div>
      </header>

      <section id="line-status" class="card muted">กำลังเชื่อมต่อ LINE...</section>

      <section class="card">
        <h2>ข้อมูลการจอง</h2>
        <p class="section-subtitle">กรอกข้อมูลให้ครบเพื่อยืนยันการจองได้เร็วขึ้น</p>

        <div class="quick-people" aria-label="เลือกจำนวนคนอย่างรวดเร็ว">
          <button type="button" class="chip" data-people="2">2 คน</button>
          <button type="button" class="chip" data-people="4">4 คน</button>
          <button type="button" class="chip" data-people="6">6 คน</button>
          <button type="button" class="chip" data-people="8">8 คน</button>
        </div>

        <form id="booking-form">
          <label>
            วันที่
            <input type="date" id="date" name="date" required />
          </label>

          <label>
            เวลา
            <select id="time" name="time" required></select>
          </label>

          <label>
            จำนวนคน
            <input type="number" id="people" name="people" min="1" max="20" value="2" required />
          </label>

          <label>
            ชื่อผู้จอง
            <input type="text" id="name" name="name" placeholder="เช่น สมชาย" required />
          </label>

          <label>
            เบอร์โทร
            <input type="tel" id="phone" name="phone" placeholder="08xxxxxxxx" required />
          </label>

          <label>
            หมายเหตุ
            <textarea id="note" name="note" rows="3" placeholder="เช่น ต้องการเก้าอี้เด็ก"></textarea>
          </label>

          <button type="submit" id="submit-btn">ยืนยันการจอง</button>
        </form>
      </section>

      <section class="card">
        <h2>สถานะโต๊ะว่าง</h2>
        <p id="availability-text" class="availability">เลือกวันที่และเวลาเพื่อดูสถานะ</p>
      </section>

      <section id="result" class="card hidden"></section>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
